<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Driftgarden — a living world in a single file. Copies drift apart; when they meet again, they merge.">
<title>Driftgarden</title>
<style id="dg-style">
/* Driftgarden — vanilla CSS, no dependencies. */

:root {
  --panel: rgba(20, 26, 22, 0.82);
  --panel-line: rgba(255, 255, 255, 0.14);
  --ink: #f2f0e8;
  --ink-soft: #b9bdb2;
  --accent: #ffd166;
  --good: #7ce38b;
  --bad: #ff8a7a;
  --radius: 12px;
  font-size: 16px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: Georgia, "Times New Roman", serif;
  color: var(--ink);
  background: #101613;
}

#stage { height: 100%; position: relative; }

/* The world itself */
#world { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

.plant-group { cursor: pointer; }
.plant-group .sway {
  animation: sway 6s ease-in-out infinite alternate;
  transform-box: fill-box;
  transform-origin: 50% 100%;
}
@keyframes sway {
  from { transform: rotate(-1.6deg); }
  to { transform: rotate(1.8deg); }
}
.plant-group.selected .sway { animation-duration: 2.5s; }

/* The kith */
.kith-group { cursor: pointer; }
.kith-bob {
  animation: kithbob 1.8s ease-in-out infinite alternate;
  transform-box: fill-box;
  transform-origin: 50% 100%;
}
@keyframes kithbob {
  from { transform: translateY(0); }
  to { transform: translateY(-1.6px); }
}
.emissary-ring {
  animation: emissaryspin 14s linear infinite;
  transform-box: fill-box;
  transform-origin: center;
}
@keyframes emissaryspin {
  to { transform: rotate(360deg); }
}
.plant-label {
  font-family: Georgia, serif;
  font-size: 12px;
  fill: rgba(255, 255, 255, 0.85);
  paint-order: stroke;
  stroke: rgba(0, 0, 0, 0.45);
  stroke-width: 2.5px;
  text-anchor: middle;
  pointer-events: none;
}

/* Top bar */
#topbar {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.6rem;
  padding: 0.65rem 0.9rem;
  background: linear-gradient(rgba(10, 14, 11, 0.65), transparent);
  font-family: "Segoe UI", system-ui, sans-serif;
}
#world-name {
  font-size: 1.05rem;
  font-weight: 650;
  background: none;
  border: none;
  color: var(--ink);
  cursor: pointer;
  font-family: Georgia, serif;
  text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  padding: 0.2rem 0.4rem;
  border-radius: 8px;
}
#world-name:hover { background: rgba(255,255,255,0.1); }
#world-name .gen { font-size: 0.75rem; color: var(--ink-soft); font-style: italic; }

.bar-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; justify-content: flex-end; }

.btn {
  font-family: "Segoe UI", system-ui, sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  border: 1px solid var(--panel-line);
  border-radius: 99px;
  background: var(--panel);
  color: var(--ink);
  padding: 0.42rem 0.9rem;
  cursor: pointer;
  backdrop-filter: blur(6px);
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #2a2105; }
.btn.primary:hover { color: #000; }
.btn:disabled { opacity: 0.45; cursor: default; }
:is(button, input, textarea):focus-visible { outline: 3px solid #6db3ff; outline-offset: 2px; }

/* Side panel (selected plant) */
#panel {
  position: absolute;
  right: 0.9rem;
  bottom: 0.9rem;
  width: min(300px, calc(100vw - 1.8rem));
  background: var(--panel);
  border: 1px solid var(--panel-line);
  border-radius: var(--radius);
  padding: 0.9rem 1rem;
  backdrop-filter: blur(8px);
  font-family: "Segoe UI", system-ui, sans-serif;
  font-size: 0.86rem;
}
#panel h2 { margin: 0 0 0.15rem; font-family: Georgia, serif; font-size: 1.1rem; }
#panel .species { color: var(--ink-soft); font-style: italic; margin-bottom: 0.5rem; }
#panel .row { display: flex; gap: 0.4rem; margin-top: 0.6rem; flex-wrap: wrap; }
#panel .meta { color: var(--ink-soft); line-height: 1.5; }
#panel .hybrid-note { color: var(--accent); margin-top: 0.4rem; line-height: 1.45; }

/* Modals */
.modal-veil {
  position: absolute; inset: 0;
  background: rgba(5, 8, 6, 0.6);
  display: flex; align-items: center; justify-content: center;
  padding: 1rem;
}
.modal {
  background: #171d19;
  border: 1px solid var(--panel-line);
  border-radius: var(--radius);
  width: min(560px, 100%);
  max-height: 82vh;
  overflow-y: auto;
  padding: 1.1rem 1.25rem;
  font-family: "Segoe UI", system-ui, sans-serif;
  font-size: 0.9rem;
  line-height: 1.55;
}
.modal h2 { font-family: Georgia, serif; margin: 0 0 0.5rem; }
.modal .muted { color: var(--ink-soft); }
.modal textarea, .modal input[type="text"] {
  width: 100%;
  background: #0e1310;
  color: var(--ink);
  border: 1px solid var(--panel-line);
  border-radius: 8px;
  padding: 0.55rem 0.7rem;
  font-family: inherit;
  font-size: 0.85rem;
}
.modal textarea { min-height: 6rem; font-family: Consolas, monospace; font-size: 0.72rem; }
.modal .row { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; align-items: center; }

.dropzone {
  border: 2px dashed var(--panel-line);
  border-radius: var(--radius);
  padding: 1.4rem 1rem;
  text-align: center;
  color: var(--ink-soft);
  margin: 0.75rem 0;
}
.dropzone.hot { border-color: var(--accent); color: var(--accent); }

/* Chronicle */
.chronicle-entry { display: flex; gap: 0.6rem; padding: 0.4rem 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
.chronicle-entry .when { color: var(--ink-soft); white-space: nowrap; font-size: 0.78rem; padding-top: 0.1rem; }
.chronicle-entry .what { flex: 1; }
.chronicle-entry.kind-merge .what { color: var(--accent); }
.chronicle-entry.kind-born .what { color: var(--good); }

/* Toasts */
#toast {
  position: absolute;
  left: 50%;
  bottom: 1.2rem;
  transform: translateX(-50%);
  background: var(--panel);
  border: 1px solid var(--panel-line);
  color: var(--ink);
  border-radius: 99px;
  padding: 0.5rem 1.1rem;
  font-family: "Segoe UI", system-ui, sans-serif;
  font-size: 0.85rem;
  backdrop-filter: blur(6px);
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
  max-width: 90vw;
  text-align: center;
}
#toast.show { opacity: 1; }

/* Merge celebration */
.merge-flash {
  position: absolute; inset: 0;
  background: radial-gradient(circle, rgba(255, 209, 102, 0.35), transparent 70%);
  animation: mergeflash 1.6s ease-out forwards;
  pointer-events: none;
}
@keyframes mergeflash { from { opacity: 1; } to { opacity: 0; } }

</style>
</head>
<body>
<noscript><p style="padding:2rem;font-family:sans-serif">Driftgarden needs JavaScript to live. No internet connection is required — just JavaScript.</p></noscript>
<div id="stage"></div>
<script id="dg-state">window.DRIFT_STATE = null /* driftgarden v0.2.0 */;</script>
<script id="dg-world">
/* Driftgarden — world logic.
 * Everything that is TRUE about a world lives here: genomes, growth, kith,
 * the chronicle, and the merge. No DOM, no browser APIs — this file runs
 * identically inside the game and inside `node test.js`, which is how the
 * merge's determinism is proven.
 */
(function (root, factory) {
  if (typeof module === 'object' && module.exports) module.exports = factory();
  else root.DriftWorld = factory();
})(typeof self !== 'undefined' ? self : this, function () {
  'use strict';

  /* ---------- environment (injectable for tests) ---------- */

  var env = {
    now: function () { return Date.now(); },
    newId: function () {
      var bytes = new Uint8Array(8);
      var c = (typeof crypto !== 'undefined' && crypto.getRandomValues) ? crypto :
        (typeof require === 'function' ? require('crypto').webcrypto : null);
      if (c && c.getRandomValues) c.getRandomValues(bytes);
      else for (var i = 0; i < 8; i++) bytes[i] = Math.floor(Math.random() * 256);
      var s = '';
      for (var j = 0; j < 8; j++) s += ('0' + bytes[j].toString(16)).slice(-2);
      return s;
    }
  };

  function setEnv(overrides) {
    if (overrides.now) env.now = overrides.now;
    if (overrides.newId) env.newId = overrides.newId;
  }

  /* ---------- constants ---------- */

  var GROW_HOURS = 36;
  var WATER_BOOST = 0.06;
  var WATER_COOLDOWN = 60 * 60 * 1000;
  var KITH_CAP = 20;
  var FOUNDER_COUNT = 3;
  var ENERGY_DECAY_PER_SEC = 1 / 300;   // peckish after ~2.5 min of watching
  var EAT_SECONDS = 5;
  var KITH_STAGES = [                    // age thresholds in real days
    { name: 'young', until: 1 },
    { name: 'grown', until: 7 },
    { name: 'elder', until: Infinity }
  ];

  /* ---------- deterministic randomness ---------- */

  function hash32(str) {
    var h = 2166136261;
    for (var i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }

  function mulberry32(seed) {
    var a = seed >>> 0;
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      var t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  /* ---------- names ---------- */

  var WORLD_A = ['Quiet', 'Amber', 'Drifting', 'Mossy', 'Silver', 'Golden', 'Windward', 'Hidden', 'Waking', 'Evening', 'Early', 'Wandering', 'Bright', 'Northern', 'Sleepy'];
  var WORLD_B = ['Hollow', 'Meadow', 'Reach', 'Terrace', 'Vale', 'Acre', 'Glen', 'Commons', 'Slope', 'Garden', 'Field', 'Bank', 'Clearing', 'Rise', 'Patch'];
  var SPECIES_A = ['Lumen', 'Vesper', 'Thistle', 'Fen', 'Aster', 'Bell', 'Clove', 'Ember', 'Sorrel', 'Rune', 'Moon', 'Paper', 'Star', 'Frost', 'Honey'];
  var SPECIES_B = ['wort', 'bloom', 'cap', 'reed', 'fern', 'lace', 'plume', 'tuft', 'vine', 'cup', 'spire', 'brush', 'quill', 'drop', 'crest'];
  // Kith names are built from their genome's own syllables — their voice.
  var SYL_OPEN = ['po', 'mi', 'ta', 'lu', 'ke', 'no', 'vi', 'sa', 'ru', 'fe', 'obi', 'ela', 'uma', 'iri', 'osu'];
  var SYL_CLOSE = ['m', 'n', 'l', 'r', 'sh', 'k', '', '', '', ''];

  function pick(rng, list) { return list[Math.floor(rng() * list.length)]; }
  function makeWorldName(rng) { return pick(rng, WORLD_A) + ' ' + pick(rng, WORLD_B); }
  function makeSpeciesName(rng) { return pick(rng, SPECIES_A) + pick(rng, SPECIES_B); }

  function makeKithName(rng, voice) {
    // voice = [i, i, i] indexes into SYL_OPEN, from the genome
    var parts = Math.floor(rng() * 2) + 2; // 2-3 syllables
    var name = '';
    for (var i = 0; i < parts; i++) {
      name += SYL_OPEN[voice[Math.floor(rng() * voice.length)] % SYL_OPEN.length];
    }
    name += pick(rng, SYL_CLOSE);
    return name.charAt(0).toUpperCase() + name.slice(1);
  }

  /* ---------- chronicle ---------- */

  function bumpClock(w) { w.clock += 1; return w.clock; }

  function chronicle(w, kind, text, fixedId, fixedWorld) {
    // Merge events are written identically by both sides (same id, text and
    // attribution), so re-merges dedupe them and A⊕B stays content-equal to B⊕A.
    w.chronicle.push({
      id: fixedId || env.newId(),
      t: bumpClock(w),
      at: env.now(),
      world: fixedWorld || w.id,
      kind: kind,
      text: text
    });
  }

  /* ---------- genomes ---------- */

  function newPlantGenome(rng) {
    return {
      hue: Math.floor(rng() * 360),
      height: 70 + Math.floor(rng() * 90),
      branches: 2 + Math.floor(rng() * 4),
      petals: 4 + Math.floor(rng() * 6),
      leaf: 0.6 + rng() * 0.9,
      rate: 0.7 + rng() * 0.7
    };
  }

  function crossGenomes(rng, a, b, spec) {
    // spec: { gene: [min, max, round?] }
    var child = {};
    Object.keys(spec).forEach(function (gene) {
      var value = rng() < 0.5 ? a[gene] : b[gene];
      if (Array.isArray(value)) { // voices etc.: splice the arrays
        var other = value === a[gene] ? b[gene] : a[gene];
        var cut = Math.floor(rng() * value.length);
        child[gene] = value.slice(0, cut).concat(other.slice(cut));
        return;
      }
      if (rng() < 0.3) value = value * (1 + (rng() - 0.5) * 0.3); // mutation
      var lo = spec[gene][0], hi = spec[gene][1];
      if (spec[gene][2]) value = Math.round(value);
      child[gene] = Math.max(lo, Math.min(hi, value));
    });
    return child;
  }

  var PLANT_GENE_SPEC = {
    hue: [0, 359, true], height: [50, 180, true], branches: [2, 6, true],
    petals: [4, 10, true], leaf: [0.4, 1.8], rate: [0.5, 1.6]
  };

  function newKithGenome(rng) {
    return {
      hue: Math.floor(rng() * 360),
      size: 0.8 + rng() * 0.5,
      speed: 0.012 + rng() * 0.014,   // field-fractions per second
      ears: Math.floor(rng() * 3),    // 0 none, 1 tufts, 2 long
      voice: [Math.floor(rng() * 15), Math.floor(rng() * 15), Math.floor(rng() * 15)]
    };
  }

  var KITH_GENE_SPEC = {
    hue: [0, 359, true], size: [0.7, 1.4], speed: [0.008, 0.03],
    ears: [0, 2, true], voice: [0, 0] // arrays are spliced, bounds unused
  };

  /* ---------- world ---------- */

  function newWorld() {
    var id = env.newId();
    var rng = mulberry32(hash32(id));
    var w = {
      format: 'driftgarden/1',
      id: id,
      name: makeWorldName(rng),
      born: env.now(),
      clock: 0,
      plants: {},
      kith: {},
      emissary: null,
      chronicle: [],
      lineage: [],
      merges: 0
    };
    chronicle(w, 'born', 'The world ' + w.name + ' came into being.');
    spawnFounderKith(w);
    return w;
  }

  function looksLikeWorld(obj) {
    return !!(obj && obj.format === 'driftgarden/1' && obj.id &&
      typeof obj.clock === 'number' && obj.plants && Array.isArray(obj.chronicle));
  }

  // Worlds preserved before the kith existed get theirs on first waking.
  function ensureKith(w) {
    if (!w.kith) { w.kith = {}; w.emissary = null; }
    if (Object.keys(w.kith).length === 0) spawnFounderKith(w);
  }

  /* ---------- plants ---------- */

  function plantSeed(w) {
    var rng = mulberry32(hash32(w.id + ':' + (w.clock + 1)));
    var id = env.newId();
    var plant = {
      id: id,
      species: makeSpeciesName(rng),
      name: null,
      genome: newPlantGenome(rng),
      x: 0.06 + rng() * 0.88,
      y: 0.55 + rng() * 0.4,
      planted: env.now(),
      tick: env.now(),
      growth: 0,
      watered: 0,
      origin: w.id,
      bornOfMerge: null,
      u: bumpClock(w)
    };
    w.plants[id] = plant;
    chronicle(w, 'plant', 'A ' + plant.species + ' seed was planted.');
    return plant;
  }

  function advanceGrowth(w) {
    var now = env.now();
    Object.keys(w.plants).forEach(function (id) {
      var p = w.plants[id];
      if (p.growth >= 1) { p.tick = now; return; }
      var hours = Math.max(0, (now - (p.tick || p.planted)) / 3600000);
      p.growth = Math.min(1, p.growth + (hours / GROW_HOURS) * p.genome.rate);
      p.tick = now;
    });
  }

  function waterPlant(w, id) {
    var p = w.plants[id];
    if (!p) return false;
    var now = env.now();
    if (p.watered && now - p.watered < WATER_COOLDOWN) return false;
    advanceGrowth(w);
    p.watered = now;
    p.growth = Math.min(1, p.growth + WATER_BOOST);
    p.u = bumpClock(w);
    return true;
  }

  function namePlant(w, id, name) {
    var p = w.plants[id];
    if (!p || !name) return;
    p.name = String(name).slice(0, 40);
    p.u = bumpClock(w);
    chronicle(w, 'name', 'The ' + p.species + ' was named “' + p.name + '”.');
  }

  function renameWorld(w, name) {
    if (!name) return;
    var old = w.name;
    w.name = String(name).slice(0, 48);
    chronicle(w, 'name', 'The world ' + old + ' took a new name: ' + w.name + '.');
  }

  /* ---------- kith ---------- */

  function makeKith(w, rng, genome, parents, origin) {
    var id = env.newId();
    var kith = {
      id: id,
      genome: genome,
      given: makeKithName(rng, genome.voice),
      name: null,             // a name the player bestows
      born: env.now(),
      parents: parents || null,
      origin: origin || w.id,
      bornOfMerge: null,
      energy: 0.7 + rng() * 0.3,
      x: 0.15 + rng() * 0.7,
      y: 0.6 + rng() * 0.34,
      tx: null, ty: null,     // wander target (ephemeral, not clocked)
      act: 'wander',
      actUntil: 0,
      facing: 1,
      u: bumpClock(w)
    };
    w.kith[id] = kith;
    return kith;
  }

  function spawnFounderKith(w) {
    var rng = mulberry32(hash32(w.id + ':founders'));
    var names = [];
    for (var i = 0; i < FOUNDER_COUNT; i++) {
      names.push(makeKith(w, rng, newKithGenome(rng)).given);
    }
    chronicle(w, 'kith', 'Three small kith wandered in and made this world their home: ' +
      names[0] + ', ' + names[1] + ' and ' + names[2] + '.');
  }

  function kithLabel(k) {
    return k.name ? k.name : k.given;
  }

  function kithStage(k, now) {
    var days = (now - k.born) / 86400000;
    for (var i = 0; i < KITH_STAGES.length; i++) {
      if (days < KITH_STAGES[i].until) return KITH_STAGES[i].name;
    }
    return 'elder';
  }

  function nameKith(w, id, name) {
    var k = w.kith[id];
    if (!k || !name) return;
    k.name = String(name).slice(0, 40);
    k.u = bumpClock(w);
    chronicle(w, 'name', k.given + ' was given a name: “' + k.name + '”.');
  }

  function blessKith(w, id) {
    var k = w.kith[id];
    if (!k) return;
    var previous = w.emissary && w.kith[w.emissary] ? kithLabel(w.kith[w.emissary]) : null;
    w.emissary = id;
    k.u = bumpClock(w);
    chronicle(w, 'bless', kithLabel(k) + ' was blessed as emissary of ' + w.name +
      (previous && previous !== kithLabel(k) ? ', taking the mantle from ' + previous : '') + '.');
  }

  /* The heartbeat: advance every kith by dt seconds. Movement and hunger are
   * ephemeral flavour — they deliberately do NOT bump the logical clock, so
   * an open tab doesn't inflate merge ordering. */
  function kithTick(w, dt) {
    var now = env.now();
    var rng = mulberry32(hash32(w.id + ':' + Math.floor(now / 1000)));
    var blooming = Object.keys(w.plants).map(function (id) { return w.plants[id]; })
      .filter(function (p) { return p.growth > 0.55; });

    Object.keys(w.kith).forEach(function (id) {
      var k = w.kith[id];
      k.energy = Math.max(0, k.energy - ENERGY_DECAY_PER_SEC * dt);

      if (k.act === 'eat') {
        if (now >= k.actUntil) { k.energy = 1; k.act = 'wander'; k.tx = null; }
        return; // stay put while sipping
      }
      if (k.act === 'rest') {
        if (now >= k.actUntil) { k.act = 'wander'; k.tx = null; }
        else return;
      }

      // hungry? head for the nearest bloom
      if (k.energy < 0.45 && blooming.length > 0) {
        var nearest = null, nearestD = Infinity;
        blooming.forEach(function (p) {
          var d = (p.x - k.x) * (p.x - k.x) + (p.y - k.y) * (p.y - k.y);
          if (d < nearestD) { nearestD = d; nearest = p; }
        });
        k.tx = nearest.x; k.ty = nearest.y;
        if (Math.sqrt(nearestD) < 0.035) {
          k.act = 'eat';
          k.actUntil = now + EAT_SECONDS * 1000;
          return;
        }
      } else if (k.tx === null || (Math.abs(k.tx - k.x) < 0.01 && Math.abs(k.ty - k.y) < 0.01)) {
        // arrived (or aimless): rest a moment, or pick somewhere new to be
        if (rng() < 0.35) {
          k.act = 'rest';
          k.actUntil = now + (4 + rng() * 10) * 1000;
          return;
        }
        k.tx = 0.05 + rng() * 0.9;
        k.ty = 0.57 + rng() * 0.38;
      }

      // walk toward target
      if (k.tx !== null) {
        var dx = k.tx - k.x, dy = k.ty - k.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var stageSpeed = kithStage(k, now) === 'elder' ? 0.6 : 1;
        var step = Math.min(dist, k.genome.speed * stageSpeed * dt);
        if (dist > 0.0001) {
          k.x += (dx / dist) * step;
          k.y += (dy / dist) * step;
          if (Math.abs(dx) > 0.002) k.facing = dx > 0 ? 1 : -1;
        }
      }
    });
  }

  /* ---------- the merge ---------- */

  function proudestPlant(plants) {
    var best = null;
    Object.keys(plants).sort().forEach(function (id) {
      var p = plants[id];
      if (!best || p.growth > best.growth ||
          (p.growth === best.growth && p.planted < best.planted)) best = p;
    });
    return best;
  }

  function eldestKith(kith) {
    var best = null;
    Object.keys(kith || {}).sort().forEach(function (id) {
      var k = kith[id];
      if (!best || k.born < best.born) best = k;
    });
    return best;
  }

  function mergeSide(w, other) {
    // A world's chosen emissary leads the meeting; a world that never chose
    // one is represented by its eldest kith.
    return (w.emissary && w.kith && w.kith[w.emissary]) ? w.kith[w.emissary] : eldestKith(w.kith);
  }

  function plantLabel(p) {
    return p.name ? p.name + ' the ' + p.species : 'a ' + p.species;
  }

  function unionByU(ours, theirs, ourWorldId, otherWorldId) {
    Object.keys(theirs).forEach(function (id) {
      var t = theirs[id];
      var o = ours[id];
      if (!o || (t.u || 0) > (o.u || 0) ||
          ((t.u || 0) === (o.u || 0) && otherWorldId > ourWorldId)) {
        ours[id] = t;
      }
    });
  }

  function mergeWorlds(w, other) {
    if (!looksLikeWorld(other)) throw new Error('not a world');
    if (other.id === w.id && other.clock <= w.clock) {
      return { same: true, gained: 0, hybrid: null, child: null, otherName: other.name };
    }
    advanceGrowth(w);
    var now = env.now();

    var beforePlants = Object.keys(w.plants).length;
    var beforeKith = Object.keys(w.kith || {}).length;

    // Champions and emissaries must be chosen from each side's own world
    // as it stood BEFORE the union.
    var ourPlantParent = proudestPlant(w.plants);
    var theirPlantParent = proudestPlant(other.plants);
    var ourEmissary = mergeSide(w, other);
    var theirEmissary = mergeSide(other, w);

    var weKnowThem = w.lineage.some(function (l) { return l.id === other.id; });
    var theyKnowUs = (other.lineage || []).some(function (l) { return l.id === w.id; });
    var firstMeeting = other.id !== w.id && !weKnowThem && !theyKnowUs;

    // Unions — never lossy.
    unionByU(w.plants, other.plants, w.id, other.id);
    if (!w.kith) w.kith = {};
    unionByU(w.kith, other.kith || {}, w.id, other.id);

    var seen = {};
    w.chronicle.forEach(function (e) { seen[e.id] = true; });
    (other.chronicle || []).forEach(function (e) { if (!seen[e.id]) w.chronicle.push(e); });
    w.chronicle.sort(function (a, b) {
      return a.t !== b.t ? a.t - b.t : (a.world < b.world ? -1 : a.world > b.world ? 1 : 0);
    });

    var lineageSeen = {};
    w.lineage.forEach(function (l) { lineageSeen[l.id] = true; });
    (other.lineage || []).concat([{ id: other.id, name: other.name }]).forEach(function (l) {
      if (!lineageSeen[l.id] && l.id !== w.id) {
        w.lineage.push(l);
        lineageSeen[l.id] = true;
      }
    });
    w.lineage.sort(function (a, b) { return a.id < b.id ? -1 : 1; });

    w.clock = Math.max(w.clock, other.clock);
    var sameWorld = other.id === w.id;
    var hybrid = null;
    var child = null;

    if (firstMeeting) {
      w.merges += 1;
      var sortedIds = [w.id, other.id].sort();
      var canonicalNames = w.id < other.id ? [w.name, other.name] : [other.name, w.name];
      var mergeClock = w.clock;

      // Everything below must be identical no matter which copy performs the
      // merge: seeded rng, canonical parent order, deterministic ids.
      var rng = mulberry32(hash32(sortedIds.join('+') + ':' + mergeClock));

      chronicle(w, 'merge', 'The worlds ' + canonicalNames[0] + ' and ' + canonicalNames[1] +
        ' met, and became one.', 'm' + sortedIds.join('') + '-' + mergeClock, sortedIds[0]);

      // The emissaries meet first — their child leads the new generation.
      if (ourEmissary && theirEmissary && ourEmissary.id !== theirEmissary.id) {
        var kithParents = [ourEmissary, theirEmissary].sort(function (a, b) { return a.id < b.id ? -1 : 1; });
        var childId = 'k' + sortedIds.join('') + '-' + mergeClock;
        var childGenome = crossGenomes(rng, kithParents[0].genome, kithParents[1].genome, KITH_GENE_SPEC);
        child = {
          id: childId,
          genome: childGenome,
          given: makeKithName(rng, childGenome.voice),
          name: null,
          born: now,
          parents: [kithParents[0].id, kithParents[1].id],
          origin: 'merge',
          bornOfMerge: {
            worlds: canonicalNames.slice(),
            parents: [kithLabel(kithParents[0]), kithLabel(kithParents[1])]
          },
          energy: 1,
          x: 0.45 + rng() * 0.1,
          y: 0.7 + rng() * 0.1,
          tx: null, ty: null,
          act: 'wander',
          actUntil: 0,
          facing: 1,
          u: bumpClock(w)
        };
        w.kith[childId] = child;
        chronicle(w, 'born', 'The emissaries ' + child.bornOfMerge.parents[0] + ' and ' +
          child.bornOfMerge.parents[1] + ' met at the meeting stone. A child was born of the two worlds: ' +
          child.given + '.', 'bk' + childId, sortedIds[0]);
      }

      // The gardens cross too.
      if (ourPlantParent && theirPlantParent && ourPlantParent.id !== theirPlantParent.id) {
        var plantParents = [ourPlantParent, theirPlantParent].sort(function (a, b) { return a.id < b.id ? -1 : 1; });
        hybrid = {
          id: 'p' + sortedIds.join('') + '-' + mergeClock,
          species: makeSpeciesName(rng),
          name: null,
          genome: crossGenomes(rng, plantParents[0].genome, plantParents[1].genome, PLANT_GENE_SPEC),
          x: 0.2 + rng() * 0.6,
          y: 0.6 + rng() * 0.3,
          planted: now,
          tick: now,
          growth: 0.15,
          watered: 0,
          origin: 'merge',
          bornOfMerge: {
            worlds: canonicalNames.slice(),
            parents: [plantLabel(plantParents[0]), plantLabel(plantParents[1])]
          },
          u: bumpClock(w)
        };
        w.plants[hybrid.id] = hybrid;
        chronicle(w, 'born', 'From the meeting of the gardens, a new species grew: the ' + hybrid.species +
          ' — child of ' + hybrid.bornOfMerge.parents[0] + ' and ' + hybrid.bornOfMerge.parents[1] + '.',
          'bp' + hybrid.id, sortedIds[0]);
      }

      // Population mercy: a merge can overfill the world; the newest-born
      // wanderers move on rather than crowd the field. Deterministic order.
      var ids = Object.keys(w.kith);
      if (ids.length > KITH_CAP) {
        // BOTH sides' emissaries are protected, so each copy evicts the same
        // wanderers and the merged worlds stay content-identical.
        var protectedIds = {};
        if (w.emissary) protectedIds[w.emissary] = true;
        if (other.emissary) protectedIds[other.emissary] = true;
        var surplus = ids.map(function (id) { return w.kith[id]; })
          .filter(function (k) { return !protectedIds[k.id] && !k.bornOfMerge && !k.name; })
          .sort(function (a, b) { return b.born !== a.born ? b.born - a.born : (a.id < b.id ? -1 : 1); })
          .slice(0, ids.length - KITH_CAP);
        surplus.forEach(function (k) { delete w.kith[k.id]; });
        if (surplus.length > 0) {
          chronicle(w, 'kith', surplus.length + ' of the newly-arrived kith found the field crowded and wandered on to seek worlds of their own.',
            'w' + sortedIds.join('') + '-' + mergeClock, sortedIds[0]);
        }
      }
    }

    return {
      same: sameWorld,
      firstMeeting: firstMeeting,
      gained: Object.keys(w.plants).length - beforePlants,
      gainedKith: Object.keys(w.kith).length - beforeKith,
      hybrid: hybrid,
      child: child,
      otherName: other.name
    };
  }

  /* ---------- importing ---------- */

  function extractWorld(text) {
    text = String(text).trim();
    if (!text) return null;
    if (text[0] === '{') {
      try {
        var direct = JSON.parse(text);
        if (looksLikeWorld(direct)) return direct;
      } catch (e) { /* keep trying */ }
    }
    var marker = 'window.DRIFT_STATE = ';
    var start = text.indexOf(marker);
    if (start === -1) return null;
    start += marker.length;
    var end = text.indexOf(';<' + '/script>', start);
    if (end === -1) return null;
    try {
      var parsed = JSON.parse(text.slice(start, end));
      return looksLikeWorld(parsed) ? parsed : null;
    } catch (e) {
      return null;
    }
  }

  /* ---------- exports ---------- */

  return {
    setEnv: setEnv,
    hash32: hash32,
    mulberry32: mulberry32,
    newWorld: newWorld,
    looksLikeWorld: looksLikeWorld,
    ensureKith: ensureKith,
    extractWorld: extractWorld,
    chronicle: chronicle,
    plantSeed: plantSeed,
    advanceGrowth: advanceGrowth,
    waterPlant: waterPlant,
    namePlant: namePlant,
    renameWorld: renameWorld,
    nameKith: nameKith,
    blessKith: blessKith,
    kithTick: kithTick,
    kithStage: kithStage,
    kithLabel: kithLabel,
    plantLabel: plantLabel,
    mergeWorlds: mergeWorlds,
    WATER_COOLDOWN: WATER_COOLDOWN,
    KITH_CAP: KITH_CAP
  };
});

</script>
<script id="dg-app">
/* Driftgarden — interface.
 * Everything the player sees and touches. All world truth lives in
 * engine/world.js (the DriftWorld module); this file only renders it,
 * persists it, and turns clicks into world events.
 */
(function () {
  'use strict';

  var W = window.DriftWorld;
  var STORE_PREFIX = 'driftgarden.';
  var KITH_TICK_MS = 2000;

  /* ---------- persistence & boot ---------- */

  var state = null;

  function save() {
    state.touched = Date.now();
    try {
      localStorage.setItem(STORE_PREFIX + state.id, JSON.stringify(state));
    } catch (e) { /* private mode etc. — the Preserve button still works */ }
  }

  function boot() {
    var embedded = window.DRIFT_STATE;
    if (embedded && W.looksLikeWorld(embedded)) {
      state = embedded;
      // If this same world was tended in this browser after the file was
      // written, the browser's copy is newer — resume from it.
      try {
        var local = localStorage.getItem(STORE_PREFIX + embedded.id);
        if (local) {
          var parsed = JSON.parse(local);
          if (parsed.clock > embedded.clock) state = parsed;
        }
      } catch (e) { /* fall through to embedded */ }
    } else {
      // A seed file carries no world. Resume the most recently tended world
      // in this browser rather than spawning a stranger every time.
      try {
        var best = null;
        for (var i = 0; i < localStorage.length; i++) {
          var key = localStorage.key(i);
          if (key.indexOf(STORE_PREFIX) !== 0) continue;
          var world = JSON.parse(localStorage.getItem(key));
          if (W.looksLikeWorld(world) && (!best || (world.touched || 0) > (best.touched || 0))) {
            best = world;
          }
        }
        if (best) state = best;
      } catch (e) { /* corrupted entry — start fresh */ }
      if (!state) state = W.newWorld();
    }
    W.ensureKith(state);   // worlds preserved before the kith existed get theirs
    W.advanceGrowth(state);
    save();
  }

  /* ---------- ephemeral UI state ---------- */

  var selected = null;   // { type: 'plant'|'kith', id: '...' } | null
  var openModal = null;  // 'merge' | 'chronicle' | 'about' | null

  /* ---------- rendering ---------- */

  var stage = document.getElementById('stage');

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function toScreen(x, y) {
    return { x: 40 + x * 920, y: 470 + (y - 0.55) / 0.4 * 480 };
  }

  function skyColors() {
    var h = new Date().getHours();
    if (h >= 21 || h < 5) return ['#0b1026', '#1b2333', '#141d16'];
    if (h < 8) return ['#2b3a5c', '#b57967', '#233225'];
    if (h < 17) return ['#7db4d8', '#cfe6d8', '#2e4630'];
    if (h < 21) return ['#3f4d78', '#d99a6c', '#26381f'];
    return ['#7db4d8', '#cfe6d8', '#2e4630'];
  }

  function render() {
    var sky = skyColors();
    var plants = Object.keys(state.plants).map(function (id) { return state.plants[id]; });
    plants.sort(function (a, b) { return a.y - b.y; });

    var svgParts = [];
    svgParts.push('<defs><linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0" stop-color="' + sky[0] + '"/><stop offset="1" stop-color="' + sky[1] + '"/></linearGradient>' +
      '<linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0" stop-color="' + sky[2] + '"/><stop offset="1" stop-color="#131a12"/></linearGradient></defs>');
    svgParts.push('<rect x="0" y="0" width="1000" height="520" fill="url(#sky)"/>');
    svgParts.push('<rect x="0" y="470" width="1000" height="530" fill="url(#ground)"/>');
    var hour = new Date().getHours();
    if (hour >= 21 || hour < 5) {
      svgParts.push('<circle cx="840" cy="110" r="34" fill="#f4f1de" opacity="0.9"/>' +
        '<circle cx="826" cy="102" r="30" fill="' + sky[0] + '"/>');
    } else {
      svgParts.push('<circle cx="840" cy="110" r="40" fill="#ffd166" opacity="0.85"/>');
    }

    plants.forEach(function (p) { svgParts.push(drawPlant(p)); });
    svgParts.push('<g id="kith-layer">' + drawAllKith() + '</g>');

    stage.innerHTML =
      '<svg id="world" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMax slice" role="img" aria-label="The garden">' +
      svgParts.join('') + '</svg>' +
      topbarHTML() +
      panelHTML() +
      modalHTML() +
      '<div id="toast"></div>';

    wireEvents();
  }

  /* ---------- plants (unchanged visual language) ---------- */

  function drawPlant(p) {
    var g = p.genome;
    var pos = toScreen(p.x, p.y);
    var stage01 = Math.max(0.08, p.growth);
    var h = g.height * stage01 * (0.9 + (p.y - 0.55) * 1.1);
    var stemColor = 'hsl(' + ((g.hue + 90) % 360) + ', 35%, 32%)';
    var petal = 'hsl(' + g.hue + ', 68%, 62%)';
    var center = 'hsl(' + ((g.hue + 40) % 360) + ', 80%, 55%)';
    var sel = selected && selected.type === 'plant' && selected.id === p.id;
    var parts = [];

    parts.push('<path d="M0 0 Q 6 ' + (-h * 0.5) + ' 0 ' + (-h) + '" stroke="' + stemColor + '" stroke-width="' + (3 + stage01 * 2) + '" fill="none" stroke-linecap="round"/>');

    var leafRng = W.mulberry32(W.hash32(p.id));
    for (var b = 0; b < g.branches; b++) {
      var frac = 0.25 + (b / g.branches) * 0.55;
      if (frac > stage01 + 0.15) break;
      var ly = -h * frac;
      var side = b % 2 === 0 ? 1 : -1;
      var len = 16 * g.leaf * stage01 * (0.7 + leafRng() * 0.6);
      parts.push('<path d="M0 ' + ly + ' q ' + (side * len) + ' ' + (-len * 0.35) + ' ' + (side * len * 1.6) + ' ' + (len * 0.15) +
        ' q ' + (-side * len * 0.8) + ' ' + (len * 0.4) + ' ' + (-side * len * 1.6) + ' ' + (-len * 0.15) + ' Z" fill="' + stemColor + '" opacity="0.9"/>');
    }

    if (p.growth > 0.55) {
      var bloom = Math.min(1, (p.growth - 0.55) / 0.45);
      var r = (5 + g.petals * 0.9) * bloom;
      var petals = [];
      for (var i = 0; i < g.petals; i++) {
        var ang = (i / g.petals) * Math.PI * 2;
        petals.push('<ellipse cx="' + (Math.cos(ang) * r).toFixed(1) + '" cy="' + (-h + Math.sin(ang) * r).toFixed(1) +
          '" rx="' + (r * 0.75).toFixed(1) + '" ry="' + (r * 0.45).toFixed(1) +
          '" fill="' + petal + '" transform="rotate(' + (ang * 180 / Math.PI).toFixed(0) + ' ' + (Math.cos(ang) * r).toFixed(1) + ' ' + (-h + Math.sin(ang) * r).toFixed(1) + ')"/>');
      }
      parts.push('<g opacity="' + (0.6 + bloom * 0.4) + '">' + petals.join('') + '<circle cx="0" cy="' + -h + '" r="' + (r * 0.55) + '" fill="' + center + '"/></g>');
    } else if (p.growth < 0.2) {
      parts.push('<circle cx="0" cy="' + (-h) + '" r="3.5" fill="' + petal + '"/>');
    }

    var label = p.name ? escapeHtml(p.name) : '';
    var labelSvg = label ? '<text class="plant-label" x="0" y="16">' + label + '</text>' : '';
    var halo = sel ? '<circle cx="0" cy="0" r="14" fill="none" stroke="#ffd166" stroke-width="2" opacity="0.9"/>' : '';

    return '<g class="plant-group' + (sel ? ' selected' : '') + '" data-plant="' + p.id + '" transform="translate(' + pos.x.toFixed(1) + ' ' + pos.y.toFixed(1) + ')">' +
      '<ellipse cx="0" cy="2" rx="14" ry="4" fill="rgba(0,0,0,0.25)"/>' + halo +
      '<g class="sway" style="animation-delay:-' + (W.hash32(p.id) % 6000) + 'ms">' + parts.join('') + '</g>' +
      labelSvg + '</g>';
  }

  /* ---------- kith ---------- */

  function drawAllKith() {
    var now = Date.now();
    return Object.keys(state.kith).map(function (id) { return state.kith[id]; })
      .sort(function (a, b) { return a.y - b.y; })
      .map(function (k) { return drawKith(k, now); })
      .join('');
  }

  function drawKith(k, now) {
    var g = k.genome;
    var pos = toScreen(k.x, k.y);
    var stage = W.kithStage(k, now);
    var scale = g.size * (stage === 'young' ? 0.65 : 1) * (0.85 + (k.y - 0.55) * 0.9);
    var sat = stage === 'elder' ? 30 : 60;
    var body = 'hsl(' + g.hue + ', ' + sat + '%, 58%)';
    var belly = 'hsl(' + g.hue + ', ' + sat + '%, 74%)';
    var sel = selected && selected.type === 'kith' && selected.id === k.id;
    var emissary = state.emissary === k.id;

    var ears = '';
    if (g.ears === 1) {
      ears = '<circle cx="-6" cy="-16" r="3" fill="' + body + '"/><circle cx="6" cy="-16" r="3" fill="' + body + '"/>';
    } else if (g.ears === 2) {
      ears = '<ellipse cx="-5" cy="-19" rx="2.4" ry="6" fill="' + body + '"/><ellipse cx="5" cy="-19" rx="2.4" ry="6" fill="' + body + '"/>';
    }

    var eyes = k.act === 'rest'
      ? '<path d="M-4.5 -9 q 2 1.6 4 0" stroke="#222" stroke-width="1" fill="none"/><path d="M0.5 -9 q 2 1.6 4 0" stroke="#222" stroke-width="1" fill="none"/>'
      : '<circle cx="-3" cy="-9" r="1.8" fill="#fff"/><circle cx="-2.6" cy="-9" r="1" fill="#222"/>' +
        '<circle cx="3" cy="-9" r="1.8" fill="#fff"/><circle cx="3.4" cy="-9" r="1" fill="#222"/>';

    var act = k.act === 'eat'
      ? '<text x="9" y="-14" font-size="9" fill="#ffd166">✿</text>'
      : '';

    var label = k.name || (emissary ? k.given : '');
    var labelSvg = label ? '<text class="plant-label" x="0" y="14">' + escapeHtml(label) + '</text>' : '';
    var haloSel = sel ? '<circle cx="0" cy="-6" r="16" fill="none" stroke="#ffd166" stroke-width="2" opacity="0.9"/>' : '';
    var haloEmissary = emissary ? '<circle cx="0" cy="-6" r="13" fill="none" stroke="#ffd166" stroke-width="1" stroke-dasharray="2 3" opacity="0.85" class="emissary-ring"/>' : '';

    return '<g class="kith-group' + (sel ? ' selected' : '') + '" data-kith="' + k.id + '" ' +
      'style="transition: transform ' + (KITH_TICK_MS / 1000 + 0.2) + 's linear" ' +
      'transform="translate(' + pos.x.toFixed(1) + ' ' + pos.y.toFixed(1) + ')">' +
      '<ellipse cx="0" cy="1" rx="9" ry="3" fill="rgba(0,0,0,0.25)"/>' +
      haloEmissary + haloSel +
      '<g class="kith-bob" style="animation-delay:-' + (W.hash32(k.id) % 3000) + 'ms">' +
      '<g transform="scale(' + (scale * k.facing).toFixed(2) + ' ' + scale.toFixed(2) + ')">' +
      ears +
      '<ellipse cx="0" cy="-7" rx="8.5" ry="9" fill="' + body + '"/>' +
      '<ellipse cx="0" cy="-4.5" rx="5" ry="5.2" fill="' + belly + '"/>' +
      eyes + act +
      '<ellipse cx="-3.5" cy="1" rx="2.2" ry="1.6" fill="' + body + '"/>' +
      '<ellipse cx="3.5" cy="1" rx="2.2" ry="1.6" fill="' + body + '"/>' +
      '</g></g>' + labelSvg + '</g>';
  }

  // Between full renders, glide the kith to their new positions cheaply.
  function updateKithLayer() {
    var layer = document.getElementById('kith-layer');
    if (!layer) return;
    var now = Date.now();
    var missing = false;
    Object.keys(state.kith).forEach(function (id) {
      var node = layer.querySelector('[data-kith="' + id + '"]');
      if (!node) { missing = true; return; }
      var k = state.kith[id];
      var pos = toScreen(k.x, k.y);
      node.setAttribute('transform', 'translate(' + pos.x.toFixed(1) + ' ' + pos.y.toFixed(1) + ')');
    });
    if (missing || layer.querySelectorAll('.kith-group').length !== Object.keys(state.kith).length) {
      render(); // population changed — rebuild properly
    }
  }

  /* ---------- chrome ---------- */

  function topbarHTML() {
    var gen = state.lineage.length > 0
      ? ' <span class="gen">· woven from ' + (state.lineage.length + 1) + ' worlds</span>' : '';
    return '<div id="topbar">' +
      '<button id="world-name" title="Rename this world">' + escapeHtml(state.name) + gen + '</button>' +
      '<div class="bar-actions">' +
      '<button class="btn primary" data-act="plant">Plant a seed</button>' +
      '<button class="btn" data-act="merge">Merge worlds…</button>' +
      '<button class="btn" data-act="chronicle">Chronicle</button>' +
      '<button class="btn" data-act="preserve">Preserve</button>' +
      '<button class="btn" data-act="about">?</button>' +
      '</div></div>';
  }

  function panelHTML() {
    if (!selected) return '';
    if (selected.type === 'plant' && state.plants[selected.id]) return plantPanelHTML(state.plants[selected.id]);
    if (selected.type === 'kith' && state.kith[selected.id]) return kithPanelHTML(state.kith[selected.id]);
    return '';
  }

  function plantPanelHTML(p) {
    var age = Math.max(1, Math.round((Date.now() - p.planted) / 3600000));
    var ageText = age < 48 ? age + 'h old' : Math.round(age / 24) + ' days old';
    var stageText = p.growth >= 1 ? 'in full bloom' : p.growth > 0.55 ? 'blooming' : p.growth > 0.2 ? 'growing' : 'a seedling';
    var canWater = !p.watered || Date.now() - p.watered >= W.WATER_COOLDOWN;
    var hybridNote = p.bornOfMerge
      ? '<div class="hybrid-note">✦ Born when <strong>' + escapeHtml(p.bornOfMerge.worlds[0]) + '</strong> met <strong>' +
        escapeHtml(p.bornOfMerge.worlds[1]) + '</strong> — child of ' + escapeHtml(p.bornOfMerge.parents[0]) +
        ' and ' + escapeHtml(p.bornOfMerge.parents[1]) + '.</div>'
      : '';
    return '<div id="panel">' +
      '<h2>' + escapeHtml(p.name || 'Unnamed ' + p.species) + '</h2>' +
      '<div class="species">' + escapeHtml(p.species) + (p.origin === 'merge' ? ' · hybrid' : '') + '</div>' +
      '<div class="meta">' + ageText + ' · ' + stageText + ' · ' + Math.round(p.growth * 100) + '% grown</div>' +
      hybridNote +
      '<div class="row">' +
      '<button class="btn" data-act="water" ' + (canWater ? '' : 'disabled title="Watered recently — try again in a while"') + '>Water</button>' +
      '<button class="btn" data-act="name-plant">Name…</button>' +
      '<button class="btn" data-act="close-panel">Close</button>' +
      '</div></div>';
  }

  function kithPanelHTML(k) {
    var now = Date.now();
    var stage = W.kithStage(k, now);
    var days = Math.floor((now - k.born) / 86400000);
    var ageText = days < 1 ? 'born today' : days + (days === 1 ? ' day' : ' days') + ' old';
    var mood = k.act === 'eat' ? 'sipping nectar' : k.act === 'rest' ? 'dozing' :
      k.energy < 0.3 ? 'hungry' : k.energy < 0.55 ? 'peckish' : 'content';
    var emissary = state.emissary === k.id;
    var mergeNote = k.bornOfMerge
      ? '<div class="hybrid-note">✦ Born at the meeting stone when <strong>' + escapeHtml(k.bornOfMerge.worlds[0]) +
        '</strong> met <strong>' + escapeHtml(k.bornOfMerge.worlds[1]) + '</strong> — child of the emissaries ' +
        escapeHtml(k.bornOfMerge.parents[0]) + ' and ' + escapeHtml(k.bornOfMerge.parents[1]) + '.</div>'
      : '';
    var emissaryNote = emissary
      ? '<div class="hybrid-note">✦ Your emissary. When worlds merge, ' + escapeHtml(W.kithLabel(k)) + ' will lead the meeting.</div>'
      : '';
    return '<div id="panel">' +
      '<h2>' + escapeHtml(k.name || k.given) + '</h2>' +
      '<div class="species">a ' + stage + ' kith' + (k.name ? ' · called ' + escapeHtml(k.given) + ' by its kin' : '') + '</div>' +
      '<div class="meta">' + ageText + ' · ' + mood + '</div>' +
      mergeNote + emissaryNote +
      '<div class="row">' +
      '<button class="btn" data-act="name-kith">Name…</button>' +
      (emissary ? '' : '<button class="btn" data-act="bless">Bless as emissary</button>') +
      '<button class="btn" data-act="close-panel">Close</button>' +
      '</div></div>';
  }

  function modalHTML() {
    if (!openModal) return '';
    var inner = '';
    if (openModal === 'merge') {
      var emissaryLine = state.emissary && state.kith[state.emissary]
        ? 'Your emissary <strong>' + escapeHtml(W.kithLabel(state.kith[state.emissary])) + '</strong> will lead the meeting.'
        : 'No emissary is blessed — the eldest kith will lead the meeting. (Click a kith to bless one.)';
      inner = '<h2>Merge worlds</h2>' +
        '<p class="muted">When two Driftgarden files meet, they become one world. Every plant, every kith, and every line of history from both survives. On a first meeting the two emissaries meet at the meeting stone, and a child of both worlds is born. ' + emissaryLine + '</p>' +
        '<div class="dropzone" id="dropzone">Drop another Driftgarden .html file here<br><span class="muted">(or use the picker / paste below)</span></div>' +
        '<div class="row"><input type="file" id="merge-file" accept=".html,.htm,.json" aria-label="Choose a Driftgarden file"></div>' +
        '<p class="muted" style="margin-bottom:0.25rem">…or paste a world here:</p>' +
        '<textarea id="merge-paste" placeholder="Paste the contents of a Driftgarden file or an exported world"></textarea>' +
        '<div class="row"><button class="btn primary" data-act="merge-paste-go">Merge pasted world</button>' +
        '<button class="btn" data-act="export-world">Copy this world as text</button>' +
        '<button class="btn" data-act="close-modal">Close</button></div>';
    } else if (openModal === 'chronicle') {
      var entries = state.chronicle.slice().reverse().map(function (e) {
        var d = new Date(e.at);
        var when = d.toLocaleDateString(undefined, { day: 'numeric', month: 'short' });
        return '<div class="chronicle-entry kind-' + e.kind + '"><span class="when">' + when +
          '</span><span class="what">' + escapeHtml(e.text) + '</span></div>';
      }).join('');
      var lineage = state.lineage.length
        ? '<p class="muted">Woven from: ' + state.lineage.map(function (l) { return escapeHtml(l.name); }).join(', ') + '.</p>'
        : '';
      inner = '<h2>The Chronicle</h2>' + lineage +
        '<div>' + entries + '</div>' +
        '<div class="row"><button class="btn" data-act="close-modal">Close</button></div>';
    } else if (openModal === 'about') {
      inner = '<h2>Driftgarden</h2>' +
        '<p>This is a living world in a single file. The file you opened <em>is</em> the world — there is no server, no account, no internet.</p>' +
        '<p><strong>Tend it.</strong> Plant seeds, water them, name what grows. Small beings — the kith — live among your plants: they wander, sip nectar from blooms, and rest. Click one to meet it.</p>' +
        '<p><strong>Bless an emissary.</strong> Choose one kith as yours. When worlds merge, your emissary leads the meeting — and the child born of a first meeting is your emissary’s child.</p>' +
        '<p><strong>Set it free.</strong> Press <em>Preserve</em> and the game writes itself into a new file with your world inside. Give copies to people. Their copies will drift.</p>' +
        '<p><strong>Reunite it.</strong> When two copies meet again, merge them. Nothing is ever lost, and every first meeting creates new life.</p>' +
        '<p class="muted">Your world stays on your device. Nothing is ever sent anywhere. Free to copy and share — that is the point. Source: github.com/zeroblowitall/special-spoon</p>' +
        '<div class="row"><button class="btn" data-act="close-modal">Close</button></div>';
    }
    return '<div class="modal-veil" id="veil"><div class="modal" role="dialog" aria-modal="true">' + inner + '</div></div>';
  }

  /* ---------- the self-writing file ---------- */

  function selfHTML() {
    var style = document.getElementById('dg-style').textContent;
    var world = document.getElementById('dg-world').textContent;
    var app = document.getElementById('dg-app').textContent;
    var json = JSON.stringify(state).replace(/</g, '\\u003c');
    return '<!DOCTYPE html>\n<html lang="en">\n<head>\n' +
      '<meta charset="utf-8">\n' +
      '<meta name="viewport" content="width=device-width, initial-scale=1">\n' +
      '<meta name="description" content="Driftgarden — a living world in a single file. Copies drift apart; when they meet again, they merge.">\n' +
      '<title>' + escapeHtml(state.name) + ' — Driftgarden</title>\n' +
      '<style id="dg-style">' + style + '</style>\n</head>\n<body>\n' +
      '<noscript><p style="padding:2rem;font-family:sans-serif">Driftgarden needs JavaScript to live. No internet connection is required — just JavaScript.</p></noscript>\n' +
      '<div id="stage"></div>\n' +
      '<script id="dg-state">window.DRIFT_STATE = ' + json + ';<\/script>\n' +
      '<script id="dg-world">' + world + '<\/script>\n' +
      '<script id="dg-app">' + app + '<\/script>\n' +
      '</body>\n</html>\n';
  }

  function preserveWorld() {
    W.advanceGrowth(state);
    W.chronicle(state, 'preserve', 'The world was preserved and set free as a file.');
    save();
    var blob = new Blob([selfHTML()], { type: 'text/html' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = state.name.toLowerCase().replace(/[^a-z0-9]+/g, '-') + '.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 5000);
  }

  /* ---------- events ---------- */

  var toastTimer = null;
  function toast(text) {
    var t = document.getElementById('toast');
    if (!t) return;
    t.textContent = text;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.classList.remove('show'); }, 4000);
  }

  function handleIncomingWorld(text) {
    var world = W.extractWorld(text);
    if (!world) { toast('That didn’t look like a Driftgarden world.'); return; }
    try {
      var result = W.mergeWorlds(state, world);
      save();
      openModal = null;
      if (result.child) selected = { type: 'kith', id: result.child.id };
      else if (result.hybrid) selected = { type: 'plant', id: result.hybrid.id };
      render();
      var flash = document.createElement('div');
      flash.className = 'merge-flash';
      stage.appendChild(flash);
      setTimeout(function () { flash.remove(); }, 1700);
      if (result.same) {
        toast(result.gained > 0 ? 'Same world, newer memories — ' + result.gained + ' new arrivals woven in.' : 'These are the same world — nothing new to weave in.');
      } else if (result.child) {
        toast('The emissaries met at the meeting stone. ' + result.child.given + ' was born of both worlds!');
      } else if (result.hybrid) {
        toast('Worlds merged. A new species was born: the ' + result.hybrid.species + '!');
      } else if (!result.firstMeeting) {
        toast('A reunion with ' + result.otherName + (result.gained + result.gainedKith > 0 ? ' — new arrivals woven in.' : ' — nothing new since you last met.'));
      } else {
        toast('Worlds merged with ' + result.otherName + '.');
      }
    } catch (e) {
      toast('That world could not be merged.');
    }
  }

  function wireEvents() {
    stage.querySelectorAll('.plant-group').forEach(function (node) {
      node.addEventListener('click', function () {
        selected = { type: 'plant', id: node.getAttribute('data-plant') };
        render();
      });
    });
    stage.querySelectorAll('.kith-group').forEach(function (node) {
      node.addEventListener('click', function () {
        selected = { type: 'kith', id: node.getAttribute('data-kith') };
        render();
      });
    });

    stage.querySelectorAll('[data-act]').forEach(function (node) {
      node.addEventListener('click', function () {
        var act = node.getAttribute('data-act');
        if (act === 'plant') {
          var p = W.plantSeed(state);
          save();
          selected = { type: 'plant', id: p.id };
          render();
          toast('A ' + p.species + ' seed settles into the soil.');
        } else if (act === 'water') {
          if (W.waterPlant(state, selected.id)) { save(); render(); toast('Watered. You can almost hear it growing.'); }
        } else if (act === 'name-plant') {
          var plantName = prompt('Name this ' + state.plants[selected.id].species + ':');
          if (plantName && plantName.trim()) { W.namePlant(state, selected.id, plantName.trim()); save(); render(); }
        } else if (act === 'name-kith') {
          var k = state.kith[selected.id];
          var kithName = prompt('Its kin call it ' + k.given + '. What do you name it?', k.name || '');
          if (kithName && kithName.trim()) { W.nameKith(state, selected.id, kithName.trim()); save(); render(); }
        } else if (act === 'bless') {
          W.blessKith(state, selected.id);
          save();
          render();
          toast(W.kithLabel(state.kith[selected.id]) + ' is now your emissary. It will lead when worlds meet.');
        } else if (act === 'close-panel') {
          selected = null; render();
        } else if (act === 'preserve') {
          preserveWorld();
          render();
          toast('World preserved. The file you just downloaded IS your world — share copies freely.');
        } else if (act === 'merge' || act === 'chronicle' || act === 'about') {
          openModal = act; render();
        } else if (act === 'close-modal') {
          openModal = null; render();
        } else if (act === 'merge-paste-go') {
          handleIncomingWorld(document.getElementById('merge-paste').value);
        } else if (act === 'export-world') {
          var box = document.getElementById('merge-paste');
          box.value = JSON.stringify(state);
          box.select();
          try { document.execCommand('copy'); toast('World copied — paste it into another Driftgarden.'); }
          catch (e) { toast('World placed in the box — copy it by hand.'); }
        }
      });
    });

    var worldName = document.getElementById('world-name');
    if (worldName) worldName.addEventListener('click', function () {
      var name = prompt('Rename this world:', state.name);
      if (name && name.trim() && name.trim() !== state.name) { W.renameWorld(state, name.trim()); save(); render(); }
    });

    var veil = document.getElementById('veil');
    if (veil) veil.addEventListener('click', function (event) {
      if (event.target === veil) { openModal = null; render(); }
    });

    var fileInput = document.getElementById('merge-file');
    if (fileInput) fileInput.addEventListener('change', function () {
      if (fileInput.files && fileInput.files[0]) readFileForMerge(fileInput.files[0]);
    });

    var dropzone = document.getElementById('dropzone');
    if (dropzone) {
      ['dragenter', 'dragover'].forEach(function (type) {
        dropzone.addEventListener(type, function (e) { e.preventDefault(); dropzone.classList.add('hot'); });
      });
      dropzone.addEventListener('dragleave', function () { dropzone.classList.remove('hot'); });
    }
  }

  function readFileForMerge(file) {
    var reader = new FileReader();
    reader.onload = function () { handleIncomingWorld(reader.result); };
    reader.readAsText(file);
  }

  window.addEventListener('dragover', function (e) { e.preventDefault(); });
  window.addEventListener('drop', function (e) {
    e.preventDefault();
    if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]) {
      readFileForMerge(e.dataTransfer.files[0]);
    }
  });

  /* ---------- heartbeats ---------- */

  // The kith live: think & move every couple of seconds, glide between beats.
  setInterval(function () {
    W.kithTick(state, KITH_TICK_MS / 1000);
    if (!openModal) updateKithLayer();
  }, KITH_TICK_MS);

  // The world endures: growth advances and is saved twice a minute.
  setInterval(function () {
    W.advanceGrowth(state);
    save();
    if (!openModal && !selected) render();
  }, 30000);

  /* ---------- boot ---------- */

  boot();
  render();
})();

</script>
</body>
</html>
